name: Project Columns

on:
  create:
  push:
    branches-ignore:
      - main
  pull_request:
    types:
      - opened
      - reopened
      - ready_for_review
      - closed

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  move-issue:
    if: github.event_name == 'create' || github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest

    steps:
      - name: Resolve target column and related issues
        id: context
        uses: actions/github-script@v7
        with:
          script: |
            const eventName = context.eventName;
            let targetColumn = "";
            let issueNumbers = [];

            if (eventName === "create" || eventName === "push") {
              if (context.payload.ref_type !== "branch") {
                if (eventName === "create") {
                  core.notice("Skipping create event because it is not a branch.");
                  core.setOutput("should_move", "false");
                  return;
                }
              }

              targetColumn = "In Progress";

              // Branch-triggered payloads do not include linked issues, so the branch
              // name must contain the issue number, e.g. `123-short-title` or
              // `issue-123-short-title`.
              const ref = eventName === "push"
                ? (context.payload.ref || "").replace(/^refs\/heads\//, "")
                : (context.payload.ref || "");

              if (!ref || ref === "main") {
                core.notice(`Skipping branch event for ref "${ref}".`);
                core.setOutput("should_move", "false");
                return;
              }

              const match = ref.match(/(?:^|[/-])(?:issue-|issues-)?(\d+)(?:[/-]|$)/i);
              if (match) {
                issueNumbers = [Number(match[1])];
              } else if (eventName === "push") {
                const commitText = (context.payload.commits || [])
                  .map((commit) => `${commit.message || ""}\n${commit.body || ""}`)
                  .join("\n");
                const commitMatches = commitText.match(/#(\d+)/g) || [];
                issueNumbers = [...new Set(commitMatches.map((value) => Number(value.slice(1))))];

                if (issueNumbers.length === 0) {
                  const { data: pullRequests } = await github.rest.pulls.list({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    state: "open",
                    head: `${context.repo.owner}:${ref}`,
                  });

                  const prText = pullRequests
                    .map((pr) => `${pr.title || ""}\n${pr.body || ""}`)
                    .join("\n");
                  const prMatches = prText.match(/#(\d+)/g) || [];
                  issueNumbers = [...new Set(prMatches.map((value) => Number(value.slice(1))))];
                }

                if (issueNumbers.length === 0) {
                  core.notice(`No issue number found in branch name "${ref}", pushed commit messages, or open PR metadata.`);
                }
              } else {
                core.notice(`No issue number found in branch name "${ref}".`);
              }
            }

            if (eventName === "pull_request") {
              const action = context.payload.action;
              const pr = context.payload.pull_request;

              if (["opened", "reopened", "ready_for_review"].includes(action)) {
                targetColumn = "In Review";
              } else if (action === "closed" && pr.merged) {
                targetColumn = "Done";
              } else if (action === "closed" && !pr.merged) {
                targetColumn = "Backlog";
              }

              const text = [pr.title || "", pr.body || "", pr.head?.ref || ""].join("\n");
              const issueMatches = text.match(/#(\d+)/g) || [];
              issueNumbers = [...new Set(issueMatches.map((value) => Number(value.slice(1))))];

              if (issueNumbers.length === 0) {
                core.notice("No issue references found in PR title, body, or branch name.");
              }
            }

            const issues = await Promise.all(
              issueNumbers.map(async (number) => {
                const { data: issue } = await github.rest.issues.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: number,
                });

                return { issue };
              })
            );
            core.setOutput("issues", JSON.stringify(issues));
            core.setOutput("target_column", targetColumn);
            core.setOutput("should_move", String(Boolean(targetColumn) && issues.length > 0));

      - name: Move issue in ProjectV2
        if: steps.context.outputs.should_move == 'true'
        env:
          PROJECTS_OWNER: ${{ vars.PROJECTS_OWNER || github.repository_owner }}
          PROJECTS_PROJECT_NUMBER: ${{ vars.PROJECTS_PROJECT_NUMBER }}
          GH_TOKEN: ${{ secrets.PROJECTS_TOKEN || secrets.GA_ACCESS_TOKEN || github.token }}
          TARGET_STATUS: ${{ steps.context.outputs.target_column }}
          ISSUES_JSON: ${{ steps.context.outputs.issues }}
        run: |
          set -euo pipefail

          owner="${PROJECTS_OWNER:-${GITHUB_REPOSITORY_OWNER}}"
          project_number="${PROJECTS_PROJECT_NUMBER:-}"

          if [ -z "${project_number}" ]; then
            projects_json="$(gh project list --owner "$owner" --format json)"
            project_count="$(printf '%s' "$projects_json" | jq 'length')"

            if [ "$project_count" -eq 0 ]; then
              echo "No accessible projects were returned for owner '$owner'. Configure PROJECTS_TOKEN with project access." >&2
              exit 1
            fi

            if [ "$project_count" -ne 1 ]; then
              echo "Expected exactly one accessible project for owner '$owner', found $project_count. Set PROJECTS_PROJECT_NUMBER." >&2
              printf '%s\n' "$projects_json" >&2
              exit 1
            fi

            project_number="$(printf '%s' "$projects_json" | jq -r '.[0].number')"
          fi

          project_id="$(gh project view "$project_number" --owner "$owner" --format json | jq -r '.id')"
          fields_json="$(gh project field-list "$project_number" --owner "$owner" --format json)"
          status_field_id="$(printf '%s' "$fields_json" | jq -r '.fields[] | select((.name | ascii_downcase) == "status") | .id' | head -n1)"
          status_option_id="$(printf '%s' "$fields_json" | jq -r --arg status "$TARGET_STATUS" '.fields[] | select((.name | ascii_downcase) == "status") | .options[] | select((.name | ascii_downcase) == ($status | ascii_downcase)) | .id' | head -n1)"

          if [ -z "$status_field_id" ] || [ -z "$status_option_id" ]; then
            echo "Could not resolve Status field or option '$TARGET_STATUS' in project #$project_number." >&2
            exit 1
          fi

          echo "$ISSUES_JSON" | jq -c '.[]' | while read -r issue_entry; do
            issue_number="$(printf '%s' "$issue_entry" | jq -r '.issue.number')"
            issue_url="$(printf '%s' "$issue_entry" | jq -r '.issue.html_url')"

            gh project item-add "$project_number" --owner "$owner" --url "$issue_url" >/dev/null

            item_id="$(gh project item-list "$project_number" --owner "$owner" --format json --jq ".items[] | select(.content.number == $issue_number) | .id" | head -n1)"

            if [ -z "$item_id" ]; then
              echo "Could not find project item for issue #$issue_number after adding it." >&2
              exit 1
            fi

            gh project item-edit \
              --id "$item_id" \
              --project-id "$project_id" \
              --field-id "$status_field_id" \
              --single-select-option-id "$status_option_id" >/dev/null

            echo "Moved issue #$issue_number to '$TARGET_STATUS' in project #$project_number."
          done
