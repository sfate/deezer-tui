name: Project Columns

on:
  create:
  push:
    branches-ignore:
      - main
  pull_request:
    types:
      - opened
      - reopened
      - ready_for_review
      - closed

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  move-issue:
    if: github.event_name == 'create' || github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest

    steps:
      - name: Resolve target column and related issues
        id: context
        uses: actions/github-script@v7
        with:
          script: |
            const eventName = context.eventName;
            let targetColumn = "";
            let issueNumbers = [];

            if (eventName === "create" || eventName === "push") {
              if (context.payload.ref_type !== "branch") {
                if (eventName === "create") {
                  core.notice("Skipping create event because it is not a branch.");
                  core.setOutput("should_move", "false");
                  return;
                }
              }

              targetColumn = "In Progress";

              // Branch-triggered payloads do not include linked issues, so the branch
              // name must contain the issue number, e.g. `123-short-title` or
              // `issue-123-short-title`.
              const ref = eventName === "push"
                ? (context.payload.ref || "").replace(/^refs\/heads\//, "")
                : (context.payload.ref || "");

              if (!ref || ref === "main") {
                core.notice(`Skipping branch event for ref "${ref}".`);
                core.setOutput("should_move", "false");
                return;
              }

              const match = ref.match(/(?:^|[/-])(?:issue-|issues-)?(\d+)(?:[/-]|$)/i);
              if (match) {
                issueNumbers = [Number(match[1])];
              } else if (eventName === "push") {
                const commitText = (context.payload.commits || [])
                  .map((commit) => `${commit.message || ""}\n${commit.body || ""}`)
                  .join("\n");
                const commitMatches = commitText.match(/#(\d+)/g) || [];
                issueNumbers = [...new Set(commitMatches.map((value) => Number(value.slice(1))))];

                if (issueNumbers.length === 0) {
                  const { data: pullRequests } = await github.rest.pulls.list({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    state: "open",
                    head: `${context.repo.owner}:${ref}`,
                  });

                  const prText = pullRequests
                    .map((pr) => `${pr.title || ""}\n${pr.body || ""}`)
                    .join("\n");
                  const prMatches = prText.match(/#(\d+)/g) || [];
                  issueNumbers = [...new Set(prMatches.map((value) => Number(value.slice(1))))];
                }

                if (issueNumbers.length === 0) {
                  core.notice(`No issue number found in branch name "${ref}", pushed commit messages, or open PR metadata.`);
                }
              } else {
                core.notice(`No issue number found in branch name "${ref}".`);
              }
            }

            if (eventName === "pull_request") {
              const action = context.payload.action;
              const pr = context.payload.pull_request;

              if (["opened", "reopened", "ready_for_review"].includes(action)) {
                targetColumn = "In Review";
              } else if (action === "closed" && pr.merged) {
                targetColumn = "Done";
              } else if (action === "closed" && !pr.merged) {
                targetColumn = "Backlog";
              }

              const text = [pr.title || "", pr.body || "", pr.head?.ref || ""].join("\n");
              const issueMatches = text.match(/#(\d+)/g) || [];
              issueNumbers = [...new Set(issueMatches.map((value) => Number(value.slice(1))))];

              if (issueNumbers.length === 0) {
                core.notice("No issue references found in PR title, body, or branch name.");
              }
            }

            const issues = await Promise.all(
              issueNumbers.map(async (number) => {
                const { data: issue } = await github.rest.issues.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: number,
                });

                return { issue };
              })
            );
            core.setOutput("issues", JSON.stringify(issues));
            core.setOutput("target_column", targetColumn);
            core.setOutput("should_move", String(Boolean(targetColumn) && issues.length > 0));

      - name: Move issue in ProjectV2
        if: steps.context.outputs.should_move == 'true'
        uses: actions/github-script@v7
        env:
          PROJECTS_OWNER: ${{ vars.PROJECTS_OWNER || github.repository_owner }}
          PROJECTS_PROJECT_NUMBER: ${{ vars.PROJECTS_PROJECT_NUMBER }}
          PROJECTS_PROJECT_TITLE: ${{ vars.PROJECTS_PROJECT_TITLE || github.event.repository.name }}
        with:
          github-token: ${{ secrets.PROJECTS_TOKEN || secrets.GA_ACCESS_TOKEN || github.token }}
          script: |
            const projectOwner = process.env.PROJECTS_OWNER || context.repo.owner;
            const projectNumber = process.env.PROJECTS_PROJECT_NUMBER;
            const projectTitle = process.env.PROJECTS_PROJECT_TITLE || context.repo.repo;
            const targetColumn = `${{ steps.context.outputs.target_column }}`;
            const issues = JSON.parse(`${{ steps.context.outputs.issues }}`);

            if (issues.length === 0) {
              core.notice("No issues to move.");
              return;
            }

            const projectQuery = `
              query($owner: String!, $project: String!) {
                repositoryOwner(login: $owner) {
                  __typename
                  ... on User {
                    projectsV2(first: 20, query: $project) {
                      nodes {
                        id
                        number
                        title
                        fields(first: 50) {
                          nodes {
                            ... on ProjectV2FieldCommon {
                              id
                              name
                            }
                            ... on ProjectV2SingleSelectField {
                              id
                              name
                              options {
                                id
                                name
                              }
                            }
                          }
                        }
                        items(first: 100) {
                          nodes {
                            id
                            content {
                              ... on Issue {
                                id
                                number
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                  ... on Organization {
                    projectsV2(first: 20, query: $project) {
                      nodes {
                        id
                        number
                        title
                        fields(first: 50) {
                          nodes {
                            ... on ProjectV2FieldCommon {
                              id
                              name
                            }
                            ... on ProjectV2SingleSelectField {
                              id
                              name
                              options {
                                id
                                name
                              }
                            }
                          }
                        }
                        items(first: 100) {
                          nodes {
                            id
                            content {
                              ... on Issue {
                                id
                                number
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }
                repository(owner: $owner, name: "${context.repo.repo}") {
                  recentProjects(first: 20) {
                    nodes {
                      id
                      ... on ProjectV2 {
                        number
                        title
                        fields(first: 50) {
                          nodes {
                            ... on ProjectV2FieldCommon {
                              id
                              name
                            }
                            ... on ProjectV2SingleSelectField {
                              id
                              name
                              options {
                                id
                                name
                              }
                            }
                          }
                        }
                        items(first: 100) {
                          nodes {
                            id
                            content {
                              ... on Issue {
                                id
                                number
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            `;

            const projectData = await github.graphql(projectQuery, {
              owner: projectOwner,
              project: projectTitle,
            });

            const ownerProjects = projectData.repositoryOwner?.projectsV2?.nodes || [];
            const recentProjects = (projectData.repository?.recentProjects?.nodes || []).filter(
              (candidate) => candidate && candidate.title
            );
            const projects = [...ownerProjects, ...recentProjects];
            const project = projectNumber
              ? projects.find((candidate) => String(candidate.number) === String(projectNumber))
              : projects.find((candidate) => candidate.title === projectTitle);

            if (!project) {
              core.setFailed(
                projectNumber
                  ? `ProjectV2 #${projectNumber} was not found for owner "${projectOwner}".`
                  : `ProjectV2 "${projectTitle}" was not found for owner "${projectOwner}".`
              );
              return;
            }

            const statusField = project.fields.nodes.find(
              (field) => field.name && field.name.toLowerCase() === "status"
            );

            if (!statusField?.options) {
              core.setFailed(`ProjectV2 "${projectName}" does not have a single-select Status field.`);
              return;
            }

            const targetOption = statusField.options.find(
              (option) => option.name.toLowerCase() === targetColumn.toLowerCase()
            );

            if (!targetOption) {
              core.setFailed(`Status option "${targetColumn}" was not found in project "${project.title}".`);
              return;
            }

            const addItemMutation = `
              mutation($projectId: ID!, $contentId: ID!) {
                addProjectV2ItemById(input: { projectId: $projectId, contentId: $contentId }) {
                  item {
                    id
                  }
                }
              }
            `;

            const updateStatusMutation = `
              mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                updateProjectV2ItemFieldValue(
                  input: {
                    projectId: $projectId
                    itemId: $itemId
                    fieldId: $fieldId
                    value: { singleSelectOptionId: $optionId }
                  }
                ) {
                  projectV2Item {
                    id
                  }
                }
              }
            `;

            for (const entry of issues) {
              const issue = entry.issue;
              let itemId = project.items.nodes.find(
                (item) => item.content?.number === issue.number
              )?.id;

              if (!itemId) {
                const added = await github.graphql(addItemMutation, {
                  projectId: project.id,
                  contentId: issue.node_id,
                });
                itemId = added.addProjectV2ItemById.item.id;
              }

              await github.graphql(updateStatusMutation, {
                projectId: project.id,
                itemId,
                fieldId: statusField.id,
                optionId: targetOption.id,
              });

              core.info(`Moved issue #${issue.number} to "${targetColumn}" in project "${project.title}".`);
            }
